<!-- registration/register.html -->
{% extends 'base.html' %}

{% block start %}
<h2 class="m-4">Register</h2>
<form method="post" class="form m-4">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary">Register</button>
</form>
<p>if you have an account <a href="{% url 'login'%}">login here</a></p>

{% endblock %}
